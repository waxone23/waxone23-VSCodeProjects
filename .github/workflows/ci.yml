name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic pytest ruff httpx mypy
      - name: Run Ruff (Only Lab 12)
        run: ruff check livecode_lab_12/
      - name: Run Mypy (Only Lab 12)
        run: mypy livecode_lab_12/main.py
      - name: Run Pytest
        run: |
          cd livecode_lab_12
          pytest
